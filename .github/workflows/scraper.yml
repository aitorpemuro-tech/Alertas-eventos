name: Rastreador de Eventos Navarra

on:
  schedule:
    # Se ejecuta cada 6 horas (en formato CRON)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub cuando quieras

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar rastreador
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Guardar cambios en el historial
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add eventos_guardados.json
          git commit -m "Actualizar lista de eventos" || exit 0
          git push
          
